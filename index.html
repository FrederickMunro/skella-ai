<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skella | Redirecting…</title>
    <link rel="canonical" href="https://skella.ca/en/" />
    <script>
      (function () {
        var lang =
          (navigator.language || navigator.userLanguage || "en").toLowerCase().indexOf("fr") === 0
            ? "fr"
            : "en";
        window.location.replace("/" + lang + "/");
      })();
    </script>
    <meta http-equiv="refresh" content="0;url=/en/" />
  </head>
  <body>
    <p><a href="/en/">English</a> · <a href="/fr/">Français</a></p>
  </body>
</html>
